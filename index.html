<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>MAWD Challenge | Design Update</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --fg: #f8f8f2;
      --muted: #8f948c;
      --accent: #98ff00;
      --line: rgba(248, 248, 242, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(248,248,242,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(248,248,242,.04) 1px, transparent 1px),
        var(--bg);
      background-size: 34px 34px;
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(560px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(12, 12, 12, .82);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    strong {
      display: block;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 7vw, 64px);
      line-height: .95;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <main>
    <strong>MAWD Challenge</strong>
    <h1>Design update in progress.</h1>
    <p>기존 랜딩페이지는 내려갔고, 새 디자인 기준으로 다시 준비 중입니다.</p>
  </main>
</body>
</html>
