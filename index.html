<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAWD</title>
  <meta name="description" content="MAWD website is being rebuilt.">
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --bg: #061728;
      --fg: #f7fbff;
      --muted: #8fb5c8;
      --accent: #7dd7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      min-height: 100vh;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(125, 215, 255, .12), transparent 34%),
        linear-gradient(180deg, #08263d 0%, var(--bg) 48%, #020913 100%);
      color: var(--fg);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(720px, calc(100vw - 48px));
      text-align: center;
    }

    .mark {
      display: inline-grid;
      width: 56px;
      height: 56px;
      margin-bottom: 28px;
      place-items: center;
      border: 2px solid rgba(125, 215, 255, .58);
      background: rgba(125, 215, 255, .08);
      box-shadow: 0 0 40px rgba(125, 215, 255, .16);
      color: var(--accent);
      font-size: 18px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 8vw, 84px);
      font-weight: 900;
      line-height: .95;
    }

    p {
      margin: 18px auto 0;
      max-width: 460px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main aria-label="MAWD rebuild notice">
    <div class="mark" aria-hidden="true">M</div>
    <h1>MAWD</h1>
    <p>새 웹사이트를 준비하고 있어요. 기존 UI는 내리고, 새 디자인으로 다시 제작합니다.</p>
  </main>
</body>
</html>
